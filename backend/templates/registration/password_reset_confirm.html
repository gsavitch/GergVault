<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Choose password | GergVault</title></head>
<body style="font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:#f4f6f1;color:#172026;margin:0;padding:32px;">
  <main style="max-width:620px;margin:0 auto;background:#fff;border:1px solid #dce3de;border-radius:12px;padding:28px;">
    <h1>Choose a new password</h1>
    {% if validlink %}
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button style="min-height:44px;border:0;border-radius:8px;padding:11px 16px;background:#1f6f5b;color:#fff;font-weight:850;" type="submit">Update password</button>
      </form>
    {% else %}
      <p>This reset link is invalid or expired.</p>
    {% endif %}
  </main>
</body>
</html>
