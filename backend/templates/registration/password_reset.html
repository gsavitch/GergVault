<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset password | GergVault</title>
  <style>
    body { margin:0; min-height:100vh; display:grid; place-items:center; padding:24px; font-family:system-ui,-apple-system,Segoe UI,sans-serif; background:#f4f6f1; color:#172026; }
    main { width:min(520px,100%); background:#fff; border:1px solid #dce3de; border-radius:12px; padding:28px; box-shadow:0 20px 70px rgba(23,32,38,.12); }
    h1 { margin:0 0 10px; }
    p { color:#657179; line-height:1.5; }
    label { display:grid; gap:6px; margin:14px 0; color:#657179; font-weight:700; font-size:13px; }
    input { width:100%; border:1px solid #dce3de; border-radius:8px; padding:12px; font:inherit; }
    button { min-height:44px; border:0; border-radius:8px; padding:11px 16px; background:#1f6f5b; color:#fff; font-weight:850; cursor:pointer; }
    a { color:#1f6f5b; font-weight:800; }
  </style>
</head>
<body>
  <main>
    <h1>Reset password</h1>
    <p>Enter your account email. If it exists, GergVault will send a password reset link.</p>
    <form method="post">
      {% csrf_token %}
      <label>Email {{ form.email }}</label>
      <button type="submit">Send reset link</button>
    </form>
    <p><a href="{% url 'login' %}">Back to sign in</a></p>
  </main>
</body>
</html>
