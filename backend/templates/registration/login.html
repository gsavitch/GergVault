<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in | GergVault</title>
  <style>
    :root { --ink:#172026; --muted:#657179; --line:#dce3de; --bg:#f4f6f1; --panel:#fff; --vault:#10211d; --green:#1f6f5b; --gold:#c7a45d; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; padding:24px; font-family:system-ui,-apple-system,Segoe UI,sans-serif; color:var(--ink); background: radial-gradient(circle at top left, #dfece4, transparent 34%), var(--bg); }
    .shell { width:min(960px,100%); display:grid; grid-template-columns: .9fr 1.1fr; overflow:hidden; border:1px solid var(--line); border-radius:14px; background:var(--panel); box-shadow:0 24px 80px rgba(23,32,38,.14); }
    .brand { padding:34px; color:#fff; background:linear-gradient(145deg,#10211d,#203d36); }
    .eyebrow { color:#dfc985; font-size:12px; text-transform:uppercase; font-weight:850; letter-spacing:1.4px; }
    h1 { margin:10px 0 12px; font-size:44px; line-height:.95; }
    p { margin:0; color:var(--muted); line-height:1.5; }
    .brand p { color:#dfe9e4; }
    .form { padding:34px; }
    label { display:grid; gap:6px; margin:14px 0; font-size:13px; color:var(--muted); font-weight:700; }
    input { width:100%; border:1px solid var(--line); border-radius:8px; padding:12px; font:inherit; }
    button, .button { display:inline-flex; align-items:center; justify-content:center; min-height:44px; padding:11px 16px; border:0; border-radius:8px; background:var(--green); color:#fff; font-weight:850; text-decoration:none; cursor:pointer; }
    .links { display:flex; gap:12px; flex-wrap:wrap; align-items:center; margin-top:16px; }
    a { color:var(--green); font-weight:800; }
    .errorlist, .error { color:#8a2f25; background:#fae9e5; border:1px solid #e7c1b9; border-radius:8px; padding:10px 12px; }
    @media (max-width:760px){ .shell{grid-template-columns:1fr;} .brand,.form{padding:24px;} h1{font-size:36px;} }
  </style>
</head>
<body>
  <main class="shell">
    <section class="brand">
      <div class="eyebrow">Collector workspace</div>
      <h1>Welcome back.</h1>
      <p>Sign in, upload front/back group photos, review the 10 draft cards, and approve only what looks right.</p>
    </section>
    <section class="form">
      <h2>Sign in to GergVault</h2>
      {% if form.errors %}<div class="error">Your username and password did not match.</div>{% endif %}
      <form method="post">
        {% csrf_token %}
        <label>Username {{ form.username }}</label>
        <label>Password {{ form.password }}</label>
        <input type="hidden" name="next" value="{{ next }}">
        <button type="submit">Sign in</button>
      </form>
      <div class="links">
        <span>New here?</span>
        <a href="{% url 'signup' %}">Create a free account</a>
        <a href="/">Back to home</a>
      </div>
    </section>
  </main>
</body>
</html>
