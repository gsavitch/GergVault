name: CI

on:
  push:
  pull_request:

jobs:
  django:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r backend/requirements.txt
      - run: python backend/manage.py check
      - run: python backend/manage.py test card_vault
