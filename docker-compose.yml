services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opencardvault}
      POSTGRES_USER: ${POSTGRES_USER:-opencardvault}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opencardvault}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opencardvault} -d ${POSTGRES_DB:-opencardvault}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    image: python:3.12-slim
    working_dir: /app/backend
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opencardvault}
      POSTGRES_USER: ${POSTGRES_USER:-opencardvault}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opencardvault}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    volumes:
      - .:/app
    ports:
      - "${WEB_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "pip install -r requirements.txt &&
             python manage.py collectstatic --noinput &&
             python manage.py migrate --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers ${WEB_WORKERS:-2} --timeout ${WEB_TIMEOUT:-120}"

volumes:
  postgres_data:
